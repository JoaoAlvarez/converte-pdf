name: Gerar executável do Windows

# Dispara ao criar uma tag de versão (ex.: v1.0.0) ou manualmente pelo botão
# "Run workflow" na aba Actions do GitHub.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write   # necessário para publicar a Release com o .exe

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Gerar o executável (.exe)
        run: >
          pyinstaller --noconfirm --onefile --windowed
          --name "ConversorPDF"
          --collect-all customtkinter
          --collect-all pdf2docx
          --collect-all pdfplumber
          main.py

      - name: Enviar o .exe como artefato do build
        uses: actions/upload-artifact@v4
        with:
          name: ConversorPDF-windows
          path: dist/ConversorPDF.exe

      - name: Publicar na página de Releases (quando for uma tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ConversorPDF.exe
          name: Conversor de PDF ${{ github.ref_name }}
          body: |
            ## Conversor de PDF ${{ github.ref_name }}

            **Como usar:** baixe o arquivo `ConversorPDF.exe` abaixo e dê dois cliques. Não precisa instalar nada.

            > Ferramentas: PDF → Excel, PDF → Word, Imagens → PDF, PDF → Imagens,
            > Office → PDF, juntar, dividir e comprimir PDF.
